<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @font-face {
    font-family: 'Instrument Serif';
    src: url('./InstrumentSerif-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: radial-gradient(120% 120% at 30% 0%, #FFF8F3 0%, #FDEDE1 55%, #FBDDCB 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; color: #211f1d; user-select: none;
    border: 1px solid rgba(226, 87, 29, 0.15);
    border-radius: 16px;
  }
  .mark { filter: drop-shadow(0 10px 22px rgba(226, 87, 29, 0.28)); }
  .wordmark { font-family: 'Instrument Serif', Georgia, serif; font-size: 52px; line-height: 1; letter-spacing: 0.2px; }
  .wordmark .lift { color: #E2571D; }
  .subtitle { font-size: 14px; color: #6b635c; letter-spacing: 0.2px; }
  .bar { width: 168px; height: 4px; border-radius: 999px; background: rgba(226, 87, 29, 0.15); overflow: hidden; margin-top: 4px; }
  .bar::after {
    content: ''; display: block; width: 42%; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #F5732A, #E2571D);
    animation: slide 1.15s ease-in-out infinite;
  }
  @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(360%); } }
</style>
</head>
<body>
  <svg class="mark" width="82" height="82" viewBox="0 0 32 32" aria-hidden="true">
    <rect x="2" y="2" width="28" height="28" rx="8.5" fill="#E2571D" />
    <g fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.5 23h11" />
      <path d="M16 20V10" />
      <path d="M11.5 14.5 16 10l4.5 4.5" />
    </g>
  </svg>
  <div class="wordmark">Claude<span class="lift">Lift</span></div>
  <div class="subtitle">Lifting your Cowork chats…</div>
  <div class="bar"></div>
</body>
</html>
